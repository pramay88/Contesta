<svg
    viewBox="0 0 100 100"
    xmlns="http://www.w3.org/2000/svg"
>
    <defs>
        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="1" />
            <stop offset="100%" stop-color="#3b82f6" stop-opacity="1" />
        </linearGradient>
    </defs>

    <!-- Calendar Grid -->
    <g stroke="white" stroke-width="3" fill="none" stroke-linecap="round">
        <!-- Outer frame -->
        <rect x="20" y="25" width="60" height="55" rx="4" />

        <!-- Header bar -->
        <line x1="20" y1="35" x2="80" y2="35" />

        <!-- Vertical lines -->
        <line x1="35" y1="35" x2="35" y2="80" />
        <line x1="50" y1="35" x2="50" y2="80" />
        <line x1="65" y1="35" x2="65" y2="80" />

        <!-- Horizontal lines -->
        <line x1="20" y1="50" x2="80" y2="50" />
        <line x1="20" y1="65" x2="80" y2="65" />
    </g>

    <!-- Cyan check/lightning mark -->
    <path
        d="M 35 45 L 45 58 L 70 30"
        stroke="#00D9FF"
        stroke-width="5"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
    />

    <!-- Header dots -->
    <circle cx="27.5" cy="30" r="2" fill="white" />
    <circle cx="72.5" cy="30" r="2" fill="white" />
</svg>
